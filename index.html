<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExamShield</title>
    
    <!-- CSS: path ke folder css/ -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Toast Container (akan diisi oleh login.js) -->
    <div id="toast-container"></div>

    <div class="login-container">
        <!-- Logo & Header -->
        <div class="header">
            <div class="logo-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>ExamShield</h1>
            <p>Sistem Ujian Online Anti-Curang</p>
        </div>

        <!-- Role Selector -->
        <div class="role-tabs">
            <button class="tab-btn active" data-role="admin">
                <i class="fas fa-crown"></i> Admin
            </button>
            <button class="tab-btn" data-role="guru">
                <i class="fas fa-chalkboard-teacher"></i> Guru
            </button>
            <button class="tab-btn" data-role="siswa">
                <i class="fas fa-user-graduate"></i> Siswa
            </button>
        </div>

        <!-- Form Login -->
        <form id="loginForm">
            <div class="input-group">
                <label for="username">USERNAME</label>
                <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password">PASSWORD</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Masukkan password">
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <!-- Error Message Container -->
            <div id="login-error" class="error-message hidden"></div>

            <button type="submit" class="btn-login">
                Masuk <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <!-- Footer -->
        <div class="footer">
            <p>ExamShield v1.0 • Dilindungi enkripsi • Anti-curang aktif</p>
        </div>
    </div>

    <!-- ✅ IMPORT LOGIN LOGIC (ES Module) -->
    <script type="module">
        import { initLogin, checkExistingSession } from './js/login.js';
        
        // Jalankan inisialisasi setelah DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            // Opsional: auto-redirect jika session masih aktif
            // checkExistingSession();
            
            // Inisialisasi login logic
            initLogin();
        });
    </script>
    
    <!-- Fallback untuk browser lama (opsional) -->
    <script nomodule src="js/script.js"></script>
</body>
</html>
