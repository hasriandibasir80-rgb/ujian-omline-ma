<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - ExamShield</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ✅ Minimal CSS untuk login page (mobile-first) */
        body { 
            margin: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-header { text-align: center; margin-bottom: 24px; }
        .login-header .logo { 
            font-size: 2rem; 
            color: #4361ee; 
            margin-bottom: 8px; 
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 500; 
            color: #333; 
        }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: #4361ee;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #3a56d4; }
        .btn-primary:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.show { display: block; }
        .loading { 
            text-align: center; 
            color: #666; 
            margin-top: 8px; 
        }
        /* Mobile adjustments */
        @media (max-width: 480px) {
            .login-card { padding: 24px 20px; }
            .login-header .logo { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo"><i class="fas fa-shield-alt"></i></div>
            <h2>ExamShield Admin</h2>
            <p class="text-muted">Masuk untuk mengelola sistem ujian</p>
        </div>

        <div id="login-error" class="error-message" role="alert"></div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="admin@examshield.id"
                    required
                    autocomplete="email"
                >
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                >
            </div>
            <button type="submit" class="btn-primary" id="btn-login">
                <i class="fas fa-sign-in-alt"></i> Masuk
            </button>
            <div id="login-loading" class="loading" hidden>
                <i class="fas fa-spinner fa-spin"></i> Memproses...
            </div>
        </form>

        <p class="text-muted small" style="text-align:center;margin-top:20px;">
            <i class="fas fa-lock"></i> Dilindungi Firebase Authentication
        </p>
    </div>

    <!-- ✅ Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';

      const firebaseConfig = {
  apiKey: "AIzaSyC45P_1xbNL8zi3e0aS4kHkIGvRvGEAmwM",
  authDomain: "takkoandi-8e99e.firebaseapp.com",
  databaseURL: "https://takkoandi-8e99e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "takkoandi-8e99e",
  storageBucket: "takkoandi-8e99e.firebasestorage.app",
  messagingSenderId: "117264025083",
  appId: "1:117264025083:web:8102fe737f7783e1b7b75e"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ✅ Cek session: jika sudah login, langsung redirect ke dashboard
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log('[Login] User sudah terautentikasi, redirect ke dashboard.html');
                window.location.href = 'dashboard.html';
            }
        });

        // ✅ Handle login form submit
        const loginForm = document.getElementById('login-form');
        const btnLogin = document.getElementById('btn-login');
        const loginLoading = document.getElementById('login-loading');
        const loginError = document.getElementById('login-error');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // UI state: loading
            btnLogin.disabled = true;
            loginLoading.hidden = false;
            loginError.classList.remove('show');
            loginError.textContent = '';

            try {
                // 🔐 Login dengan Firebase Auth
                await signInWithEmailAndPassword(auth, email, password);
                
                // ✅ Login sukses → redirect ke dashboard.html (MULTI-FILE)
                console.log('[Login] Sukses, redirect ke dashboard.html');
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                // ❌ Login gagal → tampilkan error
                console.error('[Login] Error:', error.code, error.message);
                
                let message = 'Gagal masuk. Silakan coba lagi.';
                if (error.code === 'auth/invalid-credential') {
                    message = 'Email atau password tidak valid.';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Format email tidak valid.';
                } else if (error.code === 'auth/user-disabled') {
                    message = 'Akun ini telah dinonaktifkan.';
                }
                
                loginError.textContent = message;
                loginError.classList.add('show');
                
            } finally {
                // Restore UI state
                btnLogin.disabled = false;
                loginLoading.hidden = true;
            }
        });
    </script>
</body>
</html>
