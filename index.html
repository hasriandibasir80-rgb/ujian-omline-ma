<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExamShield</title>
    <!-- ARAHKAN KE FOLDER css/ -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ✅ Tambahan style untuk debugging & transisi halaman */
        .page { display: none !important; }
        .page.active { display: flex !important; animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Toast notification style */
        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 8px; min-width: 280px; font-size: 13px; font-weight: 500; animation: slideIn 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .toast-success { background: #064e3b; border: 1px solid #065f46; color: #6ee7b7; }
        .toast-error { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
        .toast-warn { background: #451a03; border: 1px solid #78350f; color: #fcd34d; }
        .toast-info { background: #1e3a5f; border: 1px solid #1e40af; color: #93c5fd; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Error message style */
        .error-message { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; text-align: center; display: none; }
        .error-message.show { display: block; animation: shake 0.3s ease; }
        @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-5px); } 75% { transform:translateX(5px); } }
    </style>
</head>
<body>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <div class="login-container">
        <!-- Logo & Header -->
        <div class="header">
            <div class="logo-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>ExamShield</h1>
            <p>Sistem Ujian Online Anti-Curang</p>
        </div>

        <!-- Role Selector -->
        <div class="role-tabs">
            <button class="tab-btn active" data-role="admin">
                <i class="fas fa-crown"></i> Admin
            </button>
            <button class="tab-btn" data-role="guru">
                <i class="fas fa-chalkboard-teacher"></i> Guru
            </button>
            <button class="tab-btn" data-role="siswa">
                <i class="fas fa-user-graduate"></i> Siswa
            </button>
        </div>

        <!-- Form Login -->
        <form id="loginForm">
            <div class="input-group">
                <label for="username">USERNAME</label>
                <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password">PASSWORD</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Masukkan password">
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <!-- ✅ Error Message Container -->
            <div id="login-error" class="error-message"></div>

            <button type="submit" class="btn-login">
                Masuk <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <!-- Footer -->
        <div class="footer">
            <p>ExamShield v1.0 • Dilindungi enkripsi • Anti-curang aktif</p>
        </div>
    </div>

    <!-- ✅ Script dengan Router Logic Inline (Tanpa Import) -->
    <script>
        // ============================================
        // ✅ INLINE ROUTER: PERMISSIONS (Tanpa Import)
        // ============================================
        const ROLE_PERMISSIONS = {
            admin: ['dashboard', 'data-guru', 'data-siswa', 'kelola-kelas', 'data-ujian', 'bank-soal', 'monitoring', 'rekap-nilai', 'analisis-butir', 'log-aktivitas', 'pengaturan'],
            guru: ['g-dashboard', 'g-buat-ujian', 'g-bank-soal', 'g-ujian-aktif', 'g-analisis', 'g-hasil', 'g-monitoring', 'g-profil', 'g-pengaturan'],
            siswa: ['s-dashboard', 's-ujian-tersedia', 's-hasil', 's-profil']
        };

        const DEFAULT_REDIRECT = { admin: 'dashboard', guru: 'g-dashboard', siswa: 's-dashboard' };

        function canAccess(role, pageId) {
            if (!role || !pageId) return false;
            const allowed = ROLE_PERMISSIONS[role] || [];
            return allowed.includes(pageId);
        }

        function getDefaultPage(role) {
            return DEFAULT_REDIRECT[role] || 'dashboard';
        }

        function validateRoleSelection(selectedRole, userData) {
            if (!userData || !userData.role) return false;
            return userData.role === selectedRole;
        }

        // ============================================
        // ✅ INLINE ROUTER: GUARD (Tanpa Import)
        // ============================================
        function guardLogin(selectedRole, userData) {
            if (!validateRoleSelection(selectedRole, userData)) {
                return { allowed: false, message: 'Role tidak sesuai. Silakan pilih tab yang benar.', redirect: null };
            }
            const defaultPage = getDefaultPage(userData.role);
            if (!canAccess(userData.role, defaultPage)) {
                return { allowed: false, message: 'Akses ditolak: Role tidak memiliki izin akses sistem.', redirect: null };
            }
            return { allowed: true, message: 'Login berhasil', redirect: defaultPage };
        }

        // ============================================
        // ✅ KODE LAMA: UI Helpers (DIPERTAHANKAN)
        // ============================================
        function showToast(msg, type = 'info') {
            const icons = { success: '✅', error: '❌', warn: '⚠️', info: 'ℹ️' };
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type === 'warn' ? 'warn' : type}`;
            toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function showError(msg) {
            const errEl = document.getElementById('login-error');
            errEl.textContent = msg;
            errEl.classList.add('show');
            setTimeout(() => errEl.classList.remove('show'), 3000);
        }

        // ============================================
        // ✅ KODE LAMA: Toggle Password (DIPERTAHANKAN)
        // ============================================
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });

        // ============================================
        // ✅ KODE LAMA: Role Selector (DIPERTAHANKAN)
        // ============================================
        let selectedRole = 'admin';
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.dataset.role;
            });
        });

        // ============================================
        // ✅ KODE LAMA: Mock Database (DIPERTAHANKAN)
        // ============================================
        const DB = {
            users: {
                'admin': { password: '123456', role: 'admin', nama: 'Administrator', nip: 'ADMIN001' },
                '198501012010011001': { password: 'Guru@123', role: 'guru', nama: 'Budi Santoso', nip: '198501012010011001', mapel: 'Matematika' },
                'siswa001': { password: 'Siswa@1', role: 'siswa', nama: 'Ahmad Fauzi', nisn: '0012345678', kelas: 'XII IPA 1' },
            }
        };

        // ============================================
        // ✅ UPDATE: Login Handler dengan Redirect Langsung (Tanpa fetch)
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Reset error
            document.getElementById('login-error').classList.remove('show');
            
            if (!username || !password) {
                showError('Harap isi username dan password!');
                return;
            }
            
            // Cek kredensial di DB mock
            const userData = DB.users[username];
            
            if (!userData || userData.password !== password || userData.role !== selectedRole) {
                showError('Username atau password salah!');
                return;
            }
            
            // ✅ PANGGIL ROUTER GUARD untuk validasi akses
            const guardResult = guardLogin(selectedRole, userData);
            
            if (!guardResult.allowed) {
                showError(guardResult.message);
                return;
            }
            
            // ✅ Login berhasil - tampilkan toast
            showToast(`Selamat datang, ${userData.nama}!`, 'success');
            
            // Simpan session sederhana
            sessionStorage.setItem('currentUser', JSON.stringify({
                uid: username,
                role: userData.role,
                nama: userData.nama
            }));
            
            // ✅ REDIRECT LANGSUNG ke halaman dashboard sesuai role
            // Tanpa fetch() agar kompatibel dengan file:// dan Live Server
            setTimeout(() => {
                const targetPage = guardResult.redirect;
                const targetUrl = `modules/${targetPage}.html`;
                
                console.log('🔄 Redirecting to:', targetUrl);
                
                // Redirect langsung - browser akan handle 404 jika file tidak ada
                window.location.href = targetUrl;
            }, 800);
        });

        // ============================================
        // ✅ DEBUG: Log ke console untuk troubleshooting
        // ============================================
        console.log('🛡️ ExamShield Login Loaded');
        console.log('📁 Pastikan struktur folder seperti ini:');
        console.log('   root/');
        console.log('   ├── index.html          ← File ini');
        console.log('   ├── css/style.css');
        console.log('   └── modules/');
        console.log('       ├── dashboard.html  ← Harus ada untuk admin');
        console.log('       ├── g-dashboard.html ← Harus ada untuk guru');
        console.log('       └── s-dashboard.html ← Harus ada untuk siswa');
        
        // Tambahkan listener untuk mendeteksi error 404 setelah redirect
        window.addEventListener('error', (e) => {
            if (e.message?.includes('Failed to load') || e.message?.includes('404')) {
                console.error('❌ Kemungkinan file dashboard tidak ditemukan di folder modules/');
            }
        }, true);
    </script>
</body>
</html>
